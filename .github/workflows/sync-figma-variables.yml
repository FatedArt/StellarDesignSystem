name: Sync Figma Variables

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Optional mode name (e.g. Color, Light, Dark)"
        required: false
        type: string
      include_remote:
        description: "Include remote variables used in file"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 1 * * 1-5"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync variables from Figma
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            ARGS="$ARGS --mode \"${{ github.event.inputs.mode }}\""
          fi
          if [ "${{ github.event.inputs.include_remote }}" = "true" ]; then
            ARGS="$ARGS --include-remote"
          fi
          eval "node scripts/sync-figma-variables-to-tokens.mjs $ARGS"

      - name: Build tokens
        run: pnpm tokens:build

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(tokens): sync Figma variables"
          branch: "chore/sync-figma-variables"
          delete-branch: true
          title: "chore(tokens): sync Figma variables"
          body: |
            ## Summary
            - sync `packages/tokens/tokens.json` from Figma Variables
            - rebuild generated token artifacts

            ## Source
            - Workflow: `${{ github.workflow }}`
            - Trigger: `${{ github.event_name }}`
